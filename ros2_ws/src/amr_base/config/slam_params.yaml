slam_toolbox:
  ros__parameters:

    # === Plugin ===
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # === Mode ===
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    use_map_saver: true
    mode: mapping          # mapping | localization

    # === Scan matching ===
    debug_logging: true
    throttle_scans: 1
    transform_publish_period: 0.02   # 50 Hz
    transform_timeout: 0.5           # รอ TF ได้ถึง 0.5 วิ
    tf_buffer_duration: 30.          # เก็บ TF ไว้ 30 วิ
    map_update_interval: 2.0         # update ถี่ขึ้น
    resolution: 0.05                 # 5cm per pixel
    max_laser_range: 8.0             # X3 Pro max range
    minimum_travel_distance: 0.01   # ต่ำมากเพื่อ debug
    minimum_travel_heading: 0.05    # ต่ำมากเพื่อ debug

    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    link_match_minimum_response_fine: 0.1
    distance_decomposition_radius: 3.5
    response_maximum_error: 0.2
    iccp_covariance_scaling_factor: 1.0
    smear_deviation: 0.03

    # === Loop closure ===
    do_loop_closing: true
    loop_search_space_dimension: 8.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_fine: 0.45

    # === Optimization ===
    minimum_time_interval: 0.5
    use_response_expansion: true

    # === Lifelong mapping (ปิดไว้) ===
    lifelong_search_use_tree: false
    lifelong_minimum_score: 0.1
    lifelong_iou_match: 0.85
    lifelong_node_orientation_update_min_move_distance: 1.0
